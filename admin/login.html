<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin — Puppy Grass Boxi</title>
  <meta name="robots" content="noindex, nofollow" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;0,9..144,700;1,9..144,400&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    /* ── Design tokens (same as public site) ────────────────── */
    :root {
      --navy:        #1D3470;
      --navy-dark:   #152858;
      --navy-light:  #2E4F9E;
      --orange:      #E07020;
      --orange-dark: #C05E10;
      --cream:       #F5EDE0;
      --cream-light: #FAF5EE;
      --cream-dark:  #EDE0CE;
      --color-text:  #1A1A2E;
      --color-muted: #5A6080;
      --font-display:'Fraunces', Georgia, serif;
      --font-body:   'Plus Jakarta Sans', system-ui, sans-serif;
      --shadow-card: 0 2px 16px rgba(29,52,112,.10), 0 1px 4px rgba(29,52,112,.06);
      --shadow-lg:   0 8px 40px rgba(29,52,112,.18);
      --t-med: 300ms ease;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html { -webkit-text-size-adjust: 100%; }

    body {
      font-family: var(--font-body);
      min-height: 100svh;
      background-color: var(--navy-dark);
      display: grid;
      place-items: center;
      padding: 1.5rem;
      position: relative;
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Background decoration ─────────────────────────────── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 60% at 10% 0%,   rgba(46,79,158,.55) 0%, transparent 60%),
        radial-gradient(ellipse 60% 80% at 90% 100%, rgba(224,112,32,.18) 0%, transparent 55%),
        radial-gradient(ellipse 40% 40% at 50% 50%,  rgba(21,40,88,.8)   0%, transparent 100%);
      pointer-events: none;
      z-index: 0;
    }

    /* Subtle grain texture */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
      opacity: .6;
    }

    /* Floating blobs */
    .blob {
      position: fixed;
      border-radius: 50%;
      filter: blur(70px);
      pointer-events: none;
      z-index: 0;
      animation: float 12s ease-in-out infinite;
    }
    .blob--1 {
      width: 380px; height: 380px;
      background: rgba(46,79,158,.25);
      top: -80px; left: -100px;
      animation-delay: 0s;
    }
    .blob--2 {
      width: 280px; height: 280px;
      background: rgba(224,112,32,.15);
      bottom: -60px; right: -80px;
      animation-delay: -5s;
    }
    .blob--3 {
      width: 200px; height: 200px;
      background: rgba(245,237,224,.07);
      top: 50%; right: 15%;
      animation-delay: -2s;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0) scale(1); }
      50%       { transform: translateY(-30px) scale(1.05); }
    }

    /* ── Card ───────────────────────────────────────────────── */
    .login-wrap {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 420px;
      animation: rise .6s cubic-bezier(.22,.68,0,1.2) both;
    }

    @keyframes rise {
      from { opacity: 0; transform: translateY(24px) scale(.97); }
      to   { opacity: 1; transform: translateY(0)    scale(1);   }
    }

    .login-card {
      background: rgba(250,245,238,.97);
      border-radius: 24px;
      padding: 2.75rem 2.5rem 2.25rem;
      box-shadow: var(--shadow-lg), 0 0 0 1px rgba(255,255,255,.12);
      backdrop-filter: blur(12px);
    }

    /* ── Header ─────────────────────────────────────────────── */
    .login-header {
      text-align: center;
      margin-bottom: 2rem;
    }

    .login-logo-wrap {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 80px;
      height: 80px;
      background: white;
      border-radius: 20px;
      box-shadow: 0 4px 16px rgba(29,52,112,.14), 0 1px 4px rgba(29,52,112,.08);
      margin-bottom: 1.1rem;
      animation: rise .6s .1s cubic-bezier(.22,.68,0,1.2) both;
    }

    .login-logo-wrap img {
      width: 52px;
      height: 52px;
      object-fit: contain;
    }

    .login-title {
      font-family: var(--font-display);
      font-size: 1.65rem;
      font-weight: 700;
      color: var(--navy);
      line-height: 1.2;
      letter-spacing: -.02em;
      margin-bottom: .3rem;
    }

    .login-badge {
      display: inline-flex;
      align-items: center;
      gap: .35rem;
      font-size: .72rem;
      font-weight: 600;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: var(--color-muted);
      background: var(--cream-dark);
      border-radius: 999px;
      padding: .25rem .75rem;
    }

    .login-badge::before {
      content: '';
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--orange);
      display: inline-block;
    }

    /* ── Divider ─────────────────────────────────────────────── */
    .login-divider {
      height: 1px;
      background: linear-gradient(to right, transparent, var(--cream-dark) 20%, var(--cream-dark) 80%, transparent);
      margin: 0 0 1.75rem;
    }

    /* ── Form ───────────────────────────────────────────────── */
    .form-group {
      margin-bottom: 1.1rem;
    }

    .form-label {
      display: block;
      font-size: .8rem;
      font-weight: 600;
      letter-spacing: .04em;
      text-transform: uppercase;
      color: var(--color-muted);
      margin-bottom: .45rem;
    }

    .input-wrap {
      position: relative;
    }

    .input-wrap svg {
      position: absolute;
      left: .9rem;
      top: 50%;
      transform: translateY(-50%);
      color: var(--color-muted);
      pointer-events: none;
      transition: color var(--t-med);
    }

    .form-input {
      width: 100%;
      padding: .8rem 2.8rem .8rem 2.6rem;
      font-family: var(--font-body);
      font-size: .95rem;
      color: var(--color-text);
      background: white;
      border: 1.5px solid var(--cream-dark);
      border-radius: 12px;
      outline: none;
      transition: border-color var(--t-med), box-shadow var(--t-med);
    }

    .form-input:focus {
      border-color: var(--navy-light);
      box-shadow: 0 0 0 3.5px rgba(46,79,158,.13);
    }

    .form-input:focus + svg,
    .input-wrap:focus-within svg {
      color: var(--navy);
    }

    /* Eye toggle */
    .eye-btn {
      position: absolute;
      right: .85rem;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      padding: .25rem;
      cursor: pointer;
      color: var(--color-muted);
      border-radius: 6px;
      display: flex;
      transition: color var(--t-med);
    }
    .eye-btn:hover { color: var(--navy); }

    /* ── Error ──────────────────────────────────────────────── */
    .login-error {
      display: flex;
      align-items: center;
      gap: .5rem;
      font-size: .85rem;
      font-weight: 500;
      color: #c0392b;
      background: #fdf3f2;
      border: 1.5px solid #f5c6c2;
      border-radius: 10px;
      padding: .6rem .9rem;
      margin-bottom: .9rem;
      animation: shake .4s cubic-bezier(.36,.07,.19,.97) both;
    }
    .login-error[hidden] { display: none; }

    @keyframes shake {
      10%, 90%  { transform: translateX(-2px); }
      20%, 80%  { transform: translateX(4px);  }
      30%, 50%, 70% { transform: translateX(-4px); }
      40%, 60%  { transform: translateX(4px);  }
    }

    /* ── Submit button ──────────────────────────────────────── */
    .btn-login {
      width: 100%;
      padding: .85rem 1.5rem;
      font-family: var(--font-body);
      font-size: .95rem;
      font-weight: 700;
      letter-spacing: .01em;
      color: white;
      background: linear-gradient(135deg, var(--navy) 0%, var(--navy-light) 100%);
      border: none;
      border-radius: 12px;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      transition: transform var(--t-med), box-shadow var(--t-med), opacity var(--t-med);
      box-shadow: 0 4px 14px rgba(29,52,112,.35);
    }

    .btn-login::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,.1) 0%, transparent 60%);
      pointer-events: none;
    }

    .btn-login:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(29,52,112,.45);
    }

    .btn-login:active:not(:disabled) {
      transform: translateY(0);
    }

    .btn-login:disabled {
      opacity: .7;
      cursor: not-allowed;
    }

    /* Loading spinner inside button */
    .btn-login .spinner {
      display: none;
      width: 16px; height: 16px;
      border: 2px solid rgba(255,255,255,.35);
      border-top-color: white;
      border-radius: 50%;
      animation: spin .7s linear infinite;
      vertical-align: middle;
      margin-right: .4rem;
    }
    .btn-login.loading .spinner { display: inline-block; }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* ── Footer link ────────────────────────────────────────── */
    .login-footer {
      text-align: center;
      margin-top: 1.4rem;
    }

    .login-back {
      font-size: .82rem;
      color: var(--color-muted);
      display: inline-flex;
      align-items: center;
      gap: .3rem;
      text-decoration: none;
      padding: .3rem .5rem;
      border-radius: 8px;
      transition: color var(--t-med), background var(--t-med);
    }

    .login-back:hover {
      color: var(--navy);
      background: rgba(29,52,112,.06);
    }

    /* ── Paw prints decoration ──────────────────────────────── */
    .paw-deco {
      position: fixed;
      bottom: 1.5rem;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: .9rem;
      opacity: .18;
      pointer-events: none;
      z-index: 0;
    }

    .paw-deco span {
      font-size: 1.1rem;
      animation: pawBounce 2s ease-in-out infinite;
    }
    .paw-deco span:nth-child(2) { animation-delay: .3s; }
    .paw-deco span:nth-child(3) { animation-delay: .6s; }
    .paw-deco span:nth-child(4) { animation-delay: .9s; }
    .paw-deco span:nth-child(5) { animation-delay: 1.2s; }

    @keyframes pawBounce {
      0%, 100% { opacity: .5; transform: translateY(0); }
      50%       { opacity: 1;  transform: translateY(-5px); }
    }

    /* ── Focus visible ──────────────────────────────────────── */
    :focus-visible { outline: 2.5px solid var(--orange); outline-offset: 3px; }

    /* ── Responsive ─────────────────────────────────────────── */
    @media (max-width: 480px) {
      .login-card { padding: 2rem 1.5rem 1.75rem; border-radius: 20px; }
      .login-title { font-size: 1.4rem; }
    }
  </style>
</head>
<body>

  <!-- Background blobs -->
  <div class="blob blob--1" aria-hidden="true"></div>
  <div class="blob blob--2" aria-hidden="true"></div>
  <div class="blob blob--3" aria-hidden="true"></div>

  <!-- Paw print decoration -->
  <div class="paw-deco" aria-hidden="true">
    <span>🐾</span><span>🐾</span><span>🐾</span><span>🐾</span><span>🐾</span>
  </div>

  <div class="login-wrap">
    <div class="login-card">

      <!-- Header -->
      <header class="login-header">
        <div class="login-logo-wrap">
          <img src="/images/logo.png" alt="Puppy Grass Boxi" width="52" height="52" />
        </div>
        <h1 class="login-title">Puppy Grass Boxi</h1>
        <span class="login-badge">Panel de Administración</span>
      </header>

      <div class="login-divider" aria-hidden="true"></div>

      <!-- Form -->
      <form id="loginForm" novalidate>

        <div class="form-group">
          <label class="form-label" for="password">Contraseña</label>
          <div class="input-wrap">
            <input
              class="form-input"
              type="password"
              id="password"
              name="password"
              placeholder="Ingresa tu contraseña"
              autocomplete="current-password"
              required
            />
            <!-- Lock icon -->
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>
            </svg>
            <!-- Eye toggle -->
            <button type="button" class="eye-btn" id="eyeBtn" aria-label="Mostrar contraseña">
              <svg id="eyeIcon" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
              </svg>
            </button>
          </div>
        </div>

        <p class="login-error" id="loginError" role="alert" hidden>
          <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" aria-hidden="true">
            <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
          </svg>
          <span id="loginErrorText"></span>
        </p>

        <button class="btn-login" type="submit" id="loginBtn">
          <span class="spinner" aria-hidden="true"></span>
          <span id="btnText">Entrar al panel</span>
        </button>
      </form>

      <!-- Footer -->
      <footer class="login-footer">
        <a href="/" class="login-back" aria-label="Volver al sitio web">
          <svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" aria-hidden="true">
            <polyline points="15 18 9 12 15 6"/>
          </svg>
          Volver al sitio
        </a>
      </footer>

    </div>
  </div>

  <script src="/admin/js/api.js"></script>
  <script src="/admin/js/login.js"></script>
  <script>
    // Eye toggle
    const eyeBtn  = document.getElementById('eyeBtn');
    const pwInput = document.getElementById('password');
    const eyeIcon = document.getElementById('eyeIcon');

    const EYE_OPEN   = '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>';
    const EYE_CLOSED = '<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/>';

    let visible = false;
    eyeBtn.addEventListener('click', () => {
      visible = !visible;
      pwInput.type = visible ? 'text' : 'password';
      eyeIcon.innerHTML = visible ? EYE_CLOSED : EYE_OPEN;
      eyeBtn.setAttribute('aria-label', visible ? 'Ocultar contraseña' : 'Mostrar contraseña');
    });

    // Override login.js to use our styled error/spinner
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      e.stopImmediatePropagation(); // prevent login.js duplicate handler

      const password = pwInput.value;
      const btn      = document.getElementById('loginBtn');
      const errorEl  = document.getElementById('loginError');
      const errorTxt = document.getElementById('loginErrorText');
      const btnText  = document.getElementById('btnText');

      btn.disabled = true;
      btn.classList.add('loading');
      btnText.textContent = 'Verificando...';
      errorEl.hidden = true;

      try {
        await API.login(password);
        btnText.textContent = '¡Acceso concedido! ✓';
        btn.style.background = 'linear-gradient(135deg, #1a7a4a, #22a05e)';
        setTimeout(() => { window.location.href = '/admin'; }, 400);
      } catch (err) {
        errorTxt.textContent = err.message;
        errorEl.hidden = false;
        btn.disabled = false;
        btn.classList.remove('loading');
        btnText.textContent = 'Entrar al panel';
        pwInput.focus();
        // Re-trigger shake animation
        errorEl.style.animation = 'none';
        errorEl.offsetHeight; // reflow
        errorEl.style.animation = '';
      }
    }, true); // capture = true, fires before login.js
  </script>
</body>
</html>

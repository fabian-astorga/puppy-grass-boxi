# netlify.toml — Netlify Frontend Deployment Configuration
# ─────────────────────────────────────────────────────────────
# This is for deploying the PUBLIC frontend (public/) as a static site on Netlify.
# The backend (server/) runs separately on Render.
#
# SETUP:
#   1. Deploy backend to Render first — get your Render URL
#   2. In public/js/main.js, update API calls to use the full Render URL:
#      fetch('https://YOUR-APP.onrender.com/api/content')
#   3. Deploy this folder to Netlify pointing the publish dir to `public/`

[build]
  publish = "public"
  # No build command — this is a pure static site

# ── SPA Routing ───────────────────────────────────────────────
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# ── Security Headers ─────────────────────────────────────────
# These apply to all Netlify-served responses (static files).
# The backend on Render handles its own headers separately.
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    X-XSS-Protection = "1; mode=block"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob: https:; connect-src 'self' https://*.onrender.com; frame-ancestors 'none'; base-uri 'self'"

# ── Cache: static assets ─────────────────────────────────────
[[headers]]
  for = "/css/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/js/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=604800"

# ── No cache on HTML ─────────────────────────────────────────
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[build]
  publish = "public"

# ── ADMIN redirect to Render ────────────────────────────────
[[redirects]]
  from = "/admin"
  to = "https://puppy-grass-boxi.onrender.com/admin/login"
  status = 301
  force = true

[[redirects]]
  from = "/admin/*"
  to = "https://puppy-grass-boxi.onrender.com/admin/:splat"
  status = 301
  force = true

# ── API Proxy to Render ─────────────────────────────────────
[[redirects]]
  from = "/api/*"
  to = "https://puppy-grass-boxi.onrender.com/api/:splat"
  status = 200
  force = true

# ── SPA Routing ─────────────────────────────────────────────
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200